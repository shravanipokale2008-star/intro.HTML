<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>HTML5 Form</title> </head> <body> <h1>HTML5 Form Example</h1> <form> <label for="event-date">Select Date:</label> <input type="date" id="event-date" name="event-date"> <br><br> <label for="event-time">Select Time:</label> <input type="time" id="event-time" name="event-time"> <br><br> <label for="volume">Choose Range:</label> <input type="range" id="volume" name="volume" min="0" max="100"> <br><br> <label for="favorite-color">Choose Color:</label> <input type="color" id="favorite-color" name="favorite-color"> <br><br> <button type="button" data-action="save" data-user="guest"> Save Settings </button> </form> </body> </html>
